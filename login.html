<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Code Maroc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="signup-page"> <div class="form-container">
        <h2 class="neon-text">تسجيل دخول المحاربين</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="المعالج@البريد.com" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-neon">دخول</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.8rem;">ليس لديك حساب؟ <a href="signup.html" style="color: var(--neon-green);">سجل الآن</a></p>
        <a href="index.html" class="back-link">العودة للرئيسية</a>
    </div>
</body>
</html>
