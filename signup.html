<body class="signup-page">
    <div class="form-container">
        <h2 style="text-align: center; color: white;">إنشاء حساب محارب جديد</h2>
        <form id="registrationForm">
            <div class="input-group">
                <label>الاسم الشخصي</label>
                <input type="text" id="fname" placeholder="مثلاً: ياسين" required>
            </div>
            <div class="input-group">
                <label>الاسم العائلي</label>
                <input type="text" id="lname" placeholder="النسب" required>
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label>المدينة</label>
                <input type="text" id="city" placeholder="الدار البيضاء" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة مرور قوية" required>
            </div>
            <button type="submit" class="btn">تأكيد التسجيل وحفظ البيانات</button>
        </form>
        <a href="index.html" class="back-link">العودة للرئيسية</a>
    </div>
    <script src="script.js"></script>
</body>
